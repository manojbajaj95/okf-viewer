name: Publish

# Called directly by Release Please because events created with GITHUB_TOKEN do
# not trigger other workflows. Also handles manual releases and recovery runs.
# npm trusted publishing (OIDC) — no NPM_TOKEN secret.
#
# One-time setup on npmjs.com:
#   Package okf-viewer → Settings → Trusted Publisher → GitHub Actions
#   - Organization or user: manojbajaj95
#   - Repository: okf-viewer
#   - Workflow filename: publish.yml
#   - Allowed actions: npm publish
#
# Requires npm CLI >= 11.5.1 (bundled with Node 24).
# First-ever package version cannot use OIDC — publish that once manually,
# then attach the trusted publisher for subsequent releases.

on:
  workflow_call:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false

      - name: Install
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Publish
        run: npm publish
