name: Release Please

# Opens/updates a Release PR (CHANGELOG + version bump).
# Merge that PR → tag + GitHub Release → Publish workflow (OIDC to npm).
# Commits/PR titles must follow Conventional Commits:
# https://www.conventionalcommits.org/

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
